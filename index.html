<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Air-FP">
<meta name="theme-color" content="#0f172a">
<title>Air-FP — Confirmation RDV</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f172a;
  --surface: #1e293b;
  --surface2: #293548;
  --border: #334155;
  --accent: #38bdf8;
  --text: #f1f5f9;
  --text-muted: #94a3b8;
  --text-dim: #64748b;
  --danger: #f87171;
  --radius: 12px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 16px; }
body { padding-bottom: 50px; }

.header {
  background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 16px 20px 14px; position: sticky; top: 0; z-index: 10;
  display: flex; align-items: center; gap: 12px;
}
.logo {
  width: 36px; height: 36px; background: var(--accent); border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; font-weight: 600; color: #0f172a; flex-shrink: 0;
}
.header-text h1 { font-size: 17px; font-weight: 600; letter-spacing: -0.3px; }
.header-text p { font-size: 12px; color: var(--text-muted); margin-top: 1px; }

.content { padding: 20px 16px; max-width: 480px; margin: 0 auto; }

.section-label {
  font-size: 11px; font-weight: 600; letter-spacing: 0.08em;
  text-transform: uppercase; color: var(--text-dim); margin: 24px 0 10px;
}
.section-label:first-child { margin-top: 0; }

.card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }

.field { display: flex; flex-direction: column; padding: 12px 14px; border-bottom: 1px solid var(--border); }
.field:last-child { border-bottom: none; }
.field label { font-size: 11px; color: var(--text-muted); font-weight: 500; margin-bottom: 5px; letter-spacing: 0.02em; }
.field input, .field select {
  background: transparent; border: none; outline: none;
  color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 15px; width: 100%;
  -webkit-appearance: none; appearance: none;
}
.field input::placeholder { color: var(--text-dim); }
.field select option { background: #1e293b; color: var(--text); }
.field select.empty { color: var(--text-dim); }

.row3 { display: grid; grid-template-columns: 2fr 1fr 1fr; }
.row3 .field { border-right: 1px solid var(--border); border-bottom: none; }
.row3 .field:last-child { border-right: none; }

.svc-list { display: flex; flex-direction: column; gap: 10px; }
.svc-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }

.svc-top { display: flex; align-items: center; gap: 10px; padding: 12px 14px; border-bottom: 1px solid var(--border); }
.svc-top select {
  flex: 1; background: transparent; border: none; outline: none;
  color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500;
  -webkit-appearance: none; appearance: none;
}
.svc-top select option { background: #1e293b; }
.svc-top select.empty { color: var(--text-dim); }

.svc-custom-name {
  width: 100%; background: transparent; border: none; outline: none;
  color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500;
  padding: 12px 14px; border-bottom: 1px solid var(--border);
}
.svc-custom-name::placeholder { color: var(--text-dim); }

.rm-btn { background: none; border: none; color: var(--text-dim); cursor: pointer; font-size: 22px; line-height: 1; padding: 2px; flex-shrink: 0; }
.rm-btn:active { color: var(--danger); }

.svc-bottom { display: grid; grid-template-columns: 1fr 1fr 1fr; }
.svc-field { display: flex; flex-direction: column; padding: 10px 12px; border-right: 1px solid var(--border); }
.svc-field:last-child { border-right: none; }
.svc-field label { font-size: 10px; color: var(--text-dim); font-weight: 500; letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 4px; }
.svc-field input {
  background: transparent; border: none; outline: none;
  color: var(--text); font-family: 'DM Mono', monospace; font-size: 14px; width: 100%;
  -webkit-appearance: none;
}
.svc-field input::placeholder { color: var(--text-dim); }
.svc-field input:disabled { color: var(--text-dim); }

.indeter-row { display: flex; align-items: center; gap: 8px; padding: 10px 12px; border-top: 1px solid var(--border); }
.indeter-row input[type=checkbox] { accent-color: var(--accent); width: 18px; height: 18px; flex-shrink: 0; }
.indeter-row span { font-size: 13px; color: var(--text-muted); }

.add-btn {
  width: 100%; background: var(--surface); border: 1px dashed var(--border);
  border-radius: var(--radius); padding: 14px; color: var(--text-muted);
  font-family: 'DM Sans', sans-serif; font-size: 14px; cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 10px;
}
.add-btn:active { background: var(--surface2); }

.summary {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 14px; margin-top: 10px;
  display: flex; justify-content: space-between; align-items: center;
}
.summary-item { display: flex; flex-direction: column; gap: 3px; }
.summary-item span:first-child { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.05em; }
.summary-item span:last-child { font-size: 16px; font-weight: 600; font-family: 'DM Mono', monospace; color: var(--accent); }
.summary-divider { width: 1px; height: 30px; background: var(--border); }

.send-btn {
  width: 100%; margin-top: 28px; padding: 16px; background: var(--accent);
  border: none; border-radius: var(--radius); color: #0f172a;
  font-family: 'DM Sans', sans-serif; font-size: 16px; font-weight: 600;
  cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;
}
.send-btn:active { opacity: 0.85; }
.err-msg { font-size: 13px; color: var(--danger); margin-top: 12px; text-align: center; display: none; }
</style>
</head>
<body>

<div class="header">
  <div class="logo">AF</div>
  <div class="header-text">
    <h1>Air-FP</h1>
    <p>Confirmation de rendez-vous</p>
  </div>
</div>

<div class="content">

  <p class="section-label">Client</p>
  <div class="card">
    <div class="field"><label>Prénom et nom *</label><input type="text" id="nom" placeholder="ex: Émilie David" autocomplete="off"></div>
    <div class="field"><label>Téléphone *</label><input type="tel" id="tel" placeholder="ex: 819-208-9149" autocomplete="off"></div>
    <div class="field"><label>Courriel *</label><input type="email" id="courriel" placeholder="ex: client@hotmail.com" autocomplete="off"></div>
    <div class="field"><label>Adresse complète *</label><input type="text" id="adresse" placeholder="ex: 23 chemin des renards blancs, L'Ange-Gardien" autocomplete="off"></div>
  </div>

  <p class="section-label">Date et heure *</p>
  <div class="card">
    <div class="row3">
      <div class="field">
        <label>Jour</label>
        <select id="sel-jour" class="empty" onchange="this.classList.remove('empty')">
          <option value="" disabled selected>Choisir...</option>
        </select>
      </div>
      <div class="field">
        <label>Heure</label>
        <select id="sel-heure" class="empty" onchange="this.classList.remove('empty')">
          <option value="" disabled selected>—</option>
        </select>
      </div>
      <div class="field">
        <label>Minute</label>
        <select id="sel-min" class="empty" onchange="this.classList.remove('empty')">
          <option value="" disabled selected>—</option>
        </select>
      </div>
    </div>
  </div>

  <p class="section-label">Services *</p>
  <div class="svc-list" id="svc-list"></div>
  <button class="add-btn" onclick="addSvc()">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    Ajouter un service
  </button>

  <div class="summary" id="summary" style="display:none">
    <div class="summary-item"><span>Durée totale</span><span id="dur-val">—</span></div>
    <div class="summary-divider"></div>
    <div class="summary-item"><span>Total estimé</span><span id="total-val">—</span></div>
  </div>

  <div class="err-msg" id="val-msg">Veuillez remplir tous les champs obligatoires (*).</div>

  <button class="send-btn" onclick="envoyer()">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    Envoyer la confirmation
  </button>

</div>

<script>
const JOURS_FR = ['dimanche','lundi','mardi','mercredi','jeudi','vendredi','samedi'];
const MOIS_FR  = ['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];

const SUGGESTIONS = [
  "Conduits centraux avec fournaise",
  "Thermopompe murale",
  "Échangeur d'air",
  "Sécheuse",
  "Autre"
];

function initSelects() {
  const selJour = document.getElementById('sel-jour');
  const selH    = document.getElementById('sel-heure');
  const selM    = document.getElementById('sel-min');

  const today = new Date();
  for (let i = 0; i <= 60; i++) {
    const d = new Date(today);
    d.setDate(today.getDate() + i);
    const dow   = JOURS_FR[d.getDay()];
    const label = dow.charAt(0).toUpperCase()+dow.slice(1)+' '+d.getDate()+' '+MOIS_FR[d.getMonth()];
    const val   = d.toISOString().split('T')[0];
    selJour.appendChild(new Option(label, val));
  }

  for (let h = 8; h <= 17; h++) {
    selH.appendChild(new Option(h+'h00', String(h).padStart(2,'0')));
  }

  ['00','15','30','45'].forEach(m => selM.appendChild(new Option(':'+m, m)));
}

let rows = [];

function addSvc() {
  rows.push({ id: Date.now(), name: "", custom: "", qty: 1, dur: "", prix: "", indeter: false });
  render();
}

function removeRow(id) {
  rows = rows.filter(r => r.id !== id);
  render();
}

function updateRow(id, field, val) {
  const r = rows.find(r => r.id === id);
  if (!r) return;
  if (field === 'name')    { r.name = val; if (val !== 'Autre') r.custom = ''; }
  if (field === 'custom')  r.custom  = val;
  if (field === 'qty')     r.qty     = parseInt(val) || 1;
  if (field === 'dur')     r.dur     = val;
  if (field === 'prix')    r.prix    = val;
  if (field === 'indeter') { r.indeter = val; if (val) r.prix = ''; }
  render();
}

function durLabel(min) {
  min = parseInt(min) || 0;
  if (min === 0) return '—';
  const h = Math.floor(min/60), m = min%60;
  return h > 0 ? (m > 0 ? h+'h '+m+'min' : h+'h') : m+' min';
}

function render() {
  const list = document.getElementById('svc-list');
  list.innerHTML = '';

  rows.forEach(r => {
    const wrap = document.createElement('div');
    wrap.className = 'svc-card';

    const opts = SUGGESTIONS.map(s =>
      `<option value="${s}"${r.name===s?' selected':''}>${s}</option>`
    ).join('');

    let html = `
      <div class="svc-top">
        <select class="${r.name?'':'empty'}" onchange="updateRow(${r.id},'name',this.value)">
          <option value="" disabled ${r.name?'':'selected'}>Choisir un service...</option>
          ${opts}
        </select>
        <button class="rm-btn" onclick="removeRow(${r.id})" aria-label="Retirer">×</button>
      </div>`;

    if (r.name === 'Autre') {
      html += `<input class="svc-custom-name" type="text" placeholder="Nom du service personnalisé..."
        value="${r.custom}" oninput="updateRow(${r.id},'custom',this.value)">`;
    }

    html += `
      <div class="svc-bottom">
        <div class="svc-field">
          <label>Qté</label>
          <input type="number" min="1" value="${r.qty}" style="text-align:center"
            onchange="updateRow(${r.id},'qty',this.value)">
        </div>
        <div class="svc-field">
          <label>Durée (min)</label>
          <input type="number" min="0" placeholder="ex: 180" value="${r.dur}"
            onchange="updateRow(${r.id},'dur',this.value)">
        </div>
        <div class="svc-field">
          <label>Prix ($)</label>
          <input type="number" min="0" placeholder="${r.indeter?'—':'ex: 429'}"
            value="${r.indeter?'':r.prix}" ${r.indeter?'disabled':''}
            onchange="updateRow(${r.id},'prix',this.value)">
        </div>
      </div>
      <div class="indeter-row">
        <input type="checkbox" ${r.indeter?'checked':''} onchange="updateRow(${r.id},'indeter',this.checked)">
        <span>Prix à déterminer</span>
      </div>`;

    wrap.innerHTML = html;
    list.appendChild(wrap);
  });

  const totalDur = rows.reduce((s,r) => s + (parseInt(r.dur)||0)*r.qty, 0);
  let total = 0, hasIndet = false;
  rows.forEach(r => { if (r.indeter) hasIndet = true; else total += (parseFloat(r.prix)||0)*r.qty; });

  const summary = document.getElementById('summary');
  if (rows.length > 0) {
    summary.style.display = 'flex';
    document.getElementById('dur-val').textContent   = durLabel(totalDur);
    document.getElementById('total-val').textContent = hasIndet ? Math.round(total)+'$ + ?' : Math.round(total)+'$';
  } else {
    summary.style.display = 'none';
  }
}

function envoyer() {
  const nom      = document.getElementById('nom').value.trim();
  const tel      = document.getElementById('tel').value.trim();
  const courriel = document.getElementById('courriel').value.trim();
  const adresse  = document.getElementById('adresse').value.trim();
  const jour     = document.getElementById('sel-jour').value;
  const heure    = document.getElementById('sel-heure').value;
  const min      = document.getElementById('sel-min').value;
  const msg      = document.getElementById('val-msg');

  if (!nom || !tel || !courriel || !adresse || !jour || !heure || !min || rows.length === 0) {
    msg.style.display = 'block';
    msg.scrollIntoView({ behavior: 'smooth', block: 'center' });
    return;
  }
  msg.style.display = 'none';

  const svcsTexte = rows.map(r => {
    const nomSvc = r.name === 'Autre' ? (r.custom || 'Autre') : r.name;
    const p = r.indeter ? 'À déterminer' : (parseFloat(r.prix)||0)+'$';
    return `${nomSvc} x${r.qty} — ${p}`;
  }).join('\n');

  const heureStr = heure+':'+min+':00';
  const body = `c'est confirmé\n\nNom : ${nom}\nTéléphone : ${tel}\nCourriel : ${courriel}\nAdresse : ${adresse}\nDate : ${jour}\nHeure : ${heureStr}\n\nServices :\n${svcsTexte}`;

  window.location.href = `mailto:nettoyagethermo@gmail.com?subject=Confirmation RDV — ${nom}&body=${encodeURIComponent(body)}`;
}

initSelects();
addSvc();
</script>
</body>
</html>
